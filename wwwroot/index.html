<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teams Bot Transcription</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; max-width: 900px; margin-left: auto; margin-right: auto; }
    .meeting-title-bar {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 16px 0;
      padding: 14px 20px;
      background: linear-gradient(180deg, #1a237e 0%, #283593 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      letter-spacing: 0.02em;
    }
    .meeting-title-bar .meeting-id-line {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0.92;
      margin-top: 6px;
      word-break: break-all;
    }
    .page-inner { padding: 0 24px 24px; }
    h1 { margin-bottom: 8px; font-size: 1.35rem; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    input { flex: 1; min-width: 200px; padding: 10px; }
    button { padding: 10px 14px; cursor: pointer; }
    #status { margin: 10px 0; color: #1f4f8f; }
    #roster { margin: 10px 0; padding: 10px; background: #f5f7fa; border-radius: 6px; font-size: 14px; }
    #roster .tag { display: inline-block; margin: 2px 6px 2px 0; padding: 2px 8px; background: #e8eef7; border-radius: 4px; }
    #transcripts { border: 1px solid #ccc; border-radius: 6px; padding: 12px; min-height: 260px; }
    .line { margin: 6px 0; }
    .partial { color: #666; }
    .final { color: #111; font-weight: 600; }
    .speaker { color: #0d47a1; font-weight: 600; margin-right: 6px; }
    .aad-id { font-size: 11px; color: #555; font-weight: normal; }
  </style>
</head>
<body>
  <header id="meetingTitleBar" class="meeting-title-bar">
    <span id="meetingHeaderTitle">Live transcription</span>
    <span id="meetingHeaderId" class="meeting-id-line" hidden></span>
  </header>
  <div class="page-inner">
  <h1>Teams Bot Live Transcription</h1>
  <p>Enter a Teams meeting join URL, then click Join Call. The meeting title appears above when resolved from Graph.</p>

  <div class="row">
    <input id="meetingUrl" type="text" placeholder="https://teams.microsoft.com/l/meetup-join/..." />
    <button id="joinBtn">Join Call</button>
  </div>

  <div id="status">Connecting to transcript stream...</div>
  <div id="roster" hidden></div>
  <div id="transcripts"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const rosterEl = document.getElementById("roster");
    const transcriptsEl = document.getElementById("transcripts");
    const meetingUrlEl = document.getElementById("meetingUrl");
    const meetingHeaderTitleEl = document.getElementById("meetingHeaderTitle");
    const meetingHeaderIdEl = document.getElementById("meetingHeaderId");
    const joinBtn = document.getElementById("joinBtn");

    const connection = new signalR.HubConnectionBuilder()
      .withUrl("/hubs/transcripts")
      .withAutomaticReconnect()
      .build();

    let lastRosterByAad = {};
    const liveLineByStream = {};

    function pick(obj, camel, pascal) {
      if (obj == null) return undefined;
      if (camel in obj && obj[camel] != null && obj[camel] !== "") return obj[camel];
      if (pascal && pascal in obj && obj[pascal] != null && obj[pascal] !== "") return obj[pascal];
      return undefined;
    }

    connection.on("meeting-title", (payload) => {
      const t = pick(payload, "title", "Title");
      const mid = pick(payload, "meetingId", "MeetingId");
      const hasTitle = t != null && String(t).trim() !== "";
      if (hasTitle) {
        meetingHeaderTitleEl.textContent = String(t).trim();
      } else {
        meetingHeaderTitleEl.textContent = "Live transcription";
      }
      // Show correlation id only when a human title is present so the bar is not mistaken for the meeting name.
      if (hasTitle && mid != null && String(mid).trim() !== "" && String(mid).toLowerCase() !== "unknown") {
        meetingHeaderIdEl.textContent = "Meeting ID: " + String(mid).trim();
        meetingHeaderIdEl.hidden = false;
      } else {
        meetingHeaderIdEl.textContent = "";
        meetingHeaderIdEl.hidden = true;
      }
    });

    connection.on("roster", (payload) => {
      lastRosterByAad = {};
      const list = payload.participants || payload.Participants || [];
      if (list.length === 0) {
        rosterEl.hidden = true;
        rosterEl.textContent = "";
        return;
      }
      for (const p of list) {
        const oid = pick(p, "azureAdObjectId", "AzureAdObjectId");
        if (oid) {
          const dn = pick(p, "displayName", "DisplayName");
          const upn = pick(p, "userPrincipalName", "UserPrincipalName");
          const id = pick(p, "id", "Id");
          lastRosterByAad[oid] = dn || upn || id || "";
        }
      }
      rosterEl.hidden = false;
      rosterEl.innerHTML = "<strong>In this meeting (Microsoft Entra)</strong> " +
        list.map((p) => {
          const name = pick(p, "displayName", "DisplayName") || pick(p, "id", "Id") || "";
          const upnRaw = pick(p, "userPrincipalName", "UserPrincipalName");
          const upn = upnRaw ? ` — ${upnRaw}` : "";
          const oidRaw = pick(p, "azureAdObjectId", "AzureAdObjectId");
          const oid = oidRaw ? ` [object ID: ${oidRaw}]` : "";
          return `<span class="tag" title="${escapeHtml(String(upnRaw || "") + String(oidRaw || ""))}">${escapeHtml(name)}${escapeHtml(upn)}${escapeHtml(oid)}</span>`;
        }).join("");
    });

    connection.on("transcript", (message) => {
      if (message == null) return;
      const kindRaw = pick(message, "kind", "Kind");
      const kind = kindRaw != null ? String(kindRaw) : "";
      const isFinal = kind.toLowerCase() === "final";
      const text = pick(message, "text", "Text");
      if (text == null || String(text).trim() === "") {
        return;
      }
      let label = "";
      const dn = pick(message, "displayName", "DisplayName");
      const sl = pick(message, "speakerLabel", "SpeakerLabel");
      if (dn != null && String(dn).trim() !== "") {
        label = String(dn).trim();
      } else if (sl != null && String(sl).trim() !== "" && String(sl).trim() !== "0") {
        label = String(sl).trim();
      }
      const aad = pick(message, "azureAdObjectId", "AzureAdObjectId");
      if (!label && aad && lastRosterByAad[aad]) {
        label = lastRosterByAad[aad];
      }
      const sid = pick(message, "ssrc", "Ssrc") ?? pick(message, "sourceId", "SourceId");
      const streamKey = sid != null && String(sid) !== "" ? String(sid) : (aad || "unknown");
      let line = liveLineByStream[streamKey];
      if (!line) {
        line = document.createElement("div");
        transcriptsEl.prepend(line);
        liveLineByStream[streamKey] = line;
      }
      line.className = isFinal ? "line final" : "line partial";
      if (sid != null && sid !== "") {
        line.title = "Stream id (SSRC/sourceId): " + String(sid);
      }
      const who = label
        ? `<span class="speaker">${escapeHtml(label)}</span>`
        : `<span class="speaker">(unknown speaker)</span>`;
      const oid = aad
        ? ` <span class="aad-id" title="Microsoft Entra object ID">${escapeHtml(String(aad))}</span>`
        : "";
      line.innerHTML = `${who}<span class="text">${escapeHtml(String(text))}</span>${oid}`;
      if (isFinal) {
        delete liveLineByStream[streamKey];
      }
    });

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    async function startHub() {
      try {
        await connection.start();
        statusEl.textContent = "Connected. Ready to join meeting.";
      } catch (err) {
        statusEl.textContent = "SignalR connection failed. Retrying...";
        setTimeout(startHub, 2000);
      }
    }

    joinBtn.addEventListener("click", async () => {
      const meetingJoinUrl = meetingUrlEl.value.trim();
      if (!meetingJoinUrl) {
        statusEl.textContent = "Please enter a meeting join URL.";
        return;
      }

      statusEl.textContent = "Submitting join request...";
      try {
        const response = await fetch("/api/bot/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ meetingJoinUrl })
        });

        if (!response.ok) {
          const error = await response.text();
          statusEl.textContent = `Join failed: ${error}`;
          return;
        }

        statusEl.textContent = "Join request submitted. Waiting for live transcripts...";
      } catch (err) {
        statusEl.textContent = "Join request failed.";
      }
    });

    startHub();
  </script>
</body>
</html>
